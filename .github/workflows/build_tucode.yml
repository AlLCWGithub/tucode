name: Build Executable

on:
  workflow_dispatch:

jobs:
  buils-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.5"
      - run: pip install pyinstaller
      - run: pyinstaller --onefile shell.py --name tucode-windows
      - uses: actions/upload-artifact@v4
        with:
          name: tucode-windows
          path: dist/tucode-windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller
      - run: pyinstaller --onefile shell.py --name tucode-linux
      - uses: actions/upload-artifact@v4
        with:
          name: tucode-linux
          path: dist/tucode-linux
